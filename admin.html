<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BrightBridge PH — Admin Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --mint: #d4f0e8;
    --teal: #2d9e7e;
    --teal-dark: #1e7a60;
    --peach: #fde8d8;
    --warm: #f9f4ef;
    --text: #2c3e35;
    --muted: #7a9b8e;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(45,158,126,0.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--warm); color: var(--text); min-height: 100vh; }

  header {
    background: var(--white);
    border-bottom: 2px solid var(--mint);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(45,158,126,0.07);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--teal-dark);
  }
  header .sub { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  .logout-btn {
    background: var(--mint); color: var(--teal-dark); border: none;
    padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer;
    font-family: 'Nunito', sans-serif;
  }
  .logout-btn:hover { background: var(--teal); color: var(--white); }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ---------- LOGIN SCREEN ---------- */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 40px 36px; width: 100%; max-width: 380px; text-align: center;
  }
  .login-card h1 { font-family: 'Playfair Display', serif; color: var(--teal-dark); font-size: 1.4rem; margin-bottom: 6px; }
  .login-card p.tag { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--mint); border-radius: 10px;
    margin-bottom: 12px; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
  }
  .login-card input:focus { outline: none; border-color: var(--teal); }
  .login-card button {
    width: 100%; background: var(--teal); color: var(--white); border: none;
    padding: 12px; border-radius: 10px; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; margin-top: 6px;
  }
  .login-card button:hover { background: var(--teal-dark); }
  .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-msg { font-size: 0.85rem; margin-top: 10px; min-height: 18px; }
  .auth-msg.error { color: #c0553d; }

  /* ---------- KPI CARDS ---------- */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi-card {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px 22px;
  }
  .kpi-card .label { color: var(--muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .kpi-card .value { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--teal-dark); margin-top: 4px; }

  /* ---------- CHART CARDS ---------- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px 24px; margin-bottom: 20px;
  }
  .card h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--teal-dark); margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 260px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  table th, table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--mint); }
  table th { color: var(--muted); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }

  .empty-state { text-align: center; color: var(--muted); padding: 60px 20px; }
  .loading { text-align: center; color: var(--muted); padding: 60px 20px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>&#x1F309; BrightBridge PH</h1>
    <p class="tag">Admin Analytics</p>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="username" />
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" />
    <button id="authBtn" onclick="handleLogin()">Sign In</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<div id="admin-app" style="display:none;">
  <header>
    <div>
      <h1>&#x1F309; BrightBridge PH &mdash; Admin Analytics</h1>
      <div class="sub" id="headerSub">&nbsp;</div>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
  </header>

  <main>
    <div id="statsContent">
      <div class="loading">Loading analytics&hellip; &#x1F331;</div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://jyoczjbiskgxuupdcnff.supabase.co';
const SUPABASE_KEY = 'sb_publishable_G8GcsQSqHkSBj7fmJtJejA_NjlREZyE';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let charts = {};

async function initAdmin() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    showAdmin(session);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }

  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      showAdmin(session);
    } else if (event === 'SIGNED_OUT') {
      document.getElementById('admin-app').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }
  });
}

async function handleLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const msgEl = document.getElementById('authMsg');
  msgEl.textContent = '';
  msgEl.className = 'auth-msg';
  if (!email || !password) {
    msgEl.textContent = 'Please enter your email and password.';
    msgEl.className = 'auth-msg error';
    return;
  }
  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;
  } catch (err) {
    msgEl.textContent = err.message;
    msgEl.className = 'auth-msg error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleLogout() {
  await db.auth.signOut();
}

async function showAdmin(session) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'block';
  document.getElementById('headerSub').textContent = 'Signed in as ' + session.user.email;
  await loadStats(session.access_token);
}

async function loadStats(token) {
  const content = document.getElementById('statsContent');
  try {
    const res = await fetch('/.netlify/functions/admin-stats', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 403) {
      content.innerHTML = '<div class="empty-state">&#x1F512; You don&#39;t have access to this page.</div>';
      return;
    }
    if (res.status === 401) {
      content.innerHTML = '<div class="empty-state">Session expired. Please sign out and sign in again.</div>';
      return;
    }
    const stats = await res.json();
    if (stats.error) {
      content.innerHTML = '<div class="empty-state">' + stats.error + '</div>';
      return;
    }
    renderStats(stats);
  } catch (err) {
    content.innerHTML = '<div class="empty-state">Failed to load analytics: ' + err.message + '</div>';
  }
}

function renderStats(stats) {
  const content = document.getElementById('statsContent');

  if (stats.totalGenerations === 0) {
    content.innerHTML = '<div class="empty-state">No worksheet generations yet. Data will appear here once parents and teachers start using BrightBridge. &#x1F331;</div>';
    return;
  }

  content.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">Total Generations</div><div class="value">${stats.totalGenerations}</div></div>
      <div class="kpi-card"><div class="label">Total Users</div><div class="value">${stats.totalUsers}</div></div>
      <div class="kpi-card"><div class="label">With Grade Data</div><div class="value">${stats.generationsWithGradeData}</div></div>
    </div>

    <div class="card">
      <h2>&#x1F4C8; Generations (Last 14 Days)</h2>
      <div class="chart-wrap"><canvas id="chartDaily"></canvas></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>&#x1F4DA; Top Subjects</h2>
        <div class="chart-wrap"><canvas id="chartSubjects"></canvas></div>
      </div>
      <div class="card">
        <h2>&#x1F3EB; Top Grades</h2>
        <div class="chart-wrap"><canvas id="chartGrades"></canvas></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>&#x1F49B; Learning Support Usage</h2>
        <div class="chart-wrap"><canvas id="chartSupport"></canvas></div>
      </div>
      <div class="card">
        <h2>&#x1F4B3; Plan Distribution</h2>
        <div class="chart-wrap"><canvas id="chartPlans"></canvas></div>
      </div>
    </div>

    <div class="card">
      <h2>&#x1F3AF; Top Topics</h2>
      ${renderTopicsTable(stats.topTopics)}
    </div>
  `;

  drawBarChart('chartDaily', stats.dailyGenerations.map(d => d.date.slice(5)), stats.dailyGenerations.map(d => d.value), '#2d9e7e');
  drawBarChart('chartSubjects', stats.topSubjects.map(d => d.label), stats.topSubjects.map(d => d.value), '#2d9e7e');
  drawBarChart('chartGrades', stats.topGrades.map(d => d.label), stats.topGrades.map(d => d.value), '#e8a87c');
  drawBarChart('chartSupport', stats.supportUsage.map(d => d.label), stats.supportUsage.map(d => d.value), '#c98bb5');
  drawBarChart('chartPlans', stats.planDistribution.map(d => d.label), stats.planDistribution.map(d => d.value), '#7a9b8e');
}

function renderTopicsTable(topics) {
  if (!topics || topics.length === 0) {
    return '<div class="empty-state">No topic data yet.</div>';
  }
  const rows = topics.map(t => `<tr><td>${escapeHtml(t.label)}</td><td>${t.value}</td></tr>`).join('');
  return `<table><thead><tr><th>Subject &mdash; Topic</th><th>Generations</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function drawBarChart(canvasId, labels, data, color) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: color, borderRadius: 6, maxBarThickness: 36 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { family: 'Nunito' }, autoSkip: true, maxRotation: 45, minRotation: 0 } },
        y: { beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

initAdmin();
</script>

</body>
</html>
